<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FAFAF8" />
    <meta name="description" content="Plateforme de dégustation à l'aveugle — Tenuta Castellaro · Tenuta Massimo Lentsch · Collection Naturale" />
    <title>Dégustation Naturale · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@300;400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #FAFAF8; }
      body { -webkit-font-smoothing: antialiased; }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
      input[type="number"] { -moz-appearance: textfield; }
      button { -webkit-tap-highlight-color: transparent; }
      select { -webkit-appearance: none; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #FAFAF8; }
      ::-webkit-scrollbar-thumb { background: #E8E0D4; border-radius: 2px; }
      @media print {
        body { background: #FFF; }
        .no-print { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
